<svg viewBox="0 0 300 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#9aa0a8"/>
      <stop offset="0.18" stop-color="#e9edf2"/>
      <stop offset="0.5"  stop-color="#fbfdff"/>
      <stop offset="0.82" stop-color="#e9edf2"/>
      <stop offset="1"   stop-color="#9aa0a8"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3b4252"/>
      <stop offset="0.5" stop-color="#262b36"/>
      <stop offset="1"   stop-color="#3b4252"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#7e8590"/>
      <stop offset="0.5" stop-color="#c7cdd6"/>
      <stop offset="1"   stop-color="#7e8590"/>
    </linearGradient>
    <radialGradient id="hood" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd5dd"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="153" cy="326" rx="120" ry="300" fill="#000000" opacity="0.16"/>

  <!-- body -->
  <path d="M150 18
           C95 18 64 54 56 120
           C49 178 46 250 46 330
           C46 430 50 520 60 568
           C68 606 110 624 150 624
           C190 624 232 606 240 568
           C250 520 254 430 254 330
           C254 250 251 178 244 120
           C236 54 205 18 150 18 Z"
        fill="url(#body)" stroke="#7c828c" stroke-width="1.5"/>

  <!-- mirrors -->
  <path d="M48 232 C30 230 22 238 24 250 C26 260 40 258 50 252 Z" fill="#c2c8d0" stroke="#7c828c" stroke-width="1"/>
  <path d="M252 232 C270 230 278 238 276 250 C274 260 260 258 250 252 Z" fill="#c2c8d0" stroke="#7c828c" stroke-width="1"/>

  <!-- hood highlight -->
  <path d="M150 60 C118 60 100 86 96 128 C140 120 160 120 204 128 C200 86 182 60 150 60 Z" fill="url(#hood)" opacity="0.55"/>

  <!-- windshield -->
  <path d="M104 150 C130 140 170 140 196 150 L186 196 C160 188 140 188 114 196 Z" fill="url(#glass)"/>

  <!-- roof / cabin glass -->
  <rect x="100" y="206" width="100" height="190" rx="26" fill="url(#roof)"/>
  <rect x="110" y="216" width="80" height="168" rx="20" fill="url(#glass)"/>

  <!-- rear glass -->
  <path d="M114 410 C140 402 160 402 186 410 L196 452 C170 442 130 442 104 452 Z" fill="url(#glass)"/>

  <!-- subtle panel seams -->
  <path d="M150 470 L150 560" stroke="#aeb4bd" stroke-width="1.4" opacity="0.6"/>
  <path d="M70 540 C110 556 190 556 230 540" stroke="#aeb4bd" stroke-width="1.4" fill="none" opacity="0.6"/>
</svg>
